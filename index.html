<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indexing GESD</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { margin-top: 15px; display: block; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .hidden { display: none !important; }
        .gps-box { display: flex; gap: 10px; margin-top: 5px; }
        #gpsBtn { background-color: #17a2b8; width: auto; flex-shrink: 0; color: white; border: none; border-radius: 6px; padding: 12px; font-weight: bold; cursor: pointer; }
        button[type="submit"] { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #calculatedDisplay { font-family: monospace; color: #28a745; font-weight: bold; margin-top: 5px; display: block; }
        .asterisk { color: #1a73e8; }
        
        /* New CSS for the Counters */
        .stats-box { margin-top: 25px; padding: 15px; background-color: #e9ecef; border-radius: 8px; font-size: 14px; color: #333; text-align: center; }
        .stats-box span { font-weight: bold; color: #1a73e8; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Indexing Data Entry</h2>
    <button id="installAppBtn" class="hidden" style="background-color: #007bff; margin-bottom: 15px;">📲 Install App to Home Screen</button>
    <form id="indexingForm">
        
        <label>Entered Consumer No.</label>
        <input type="number" id="enteredConsumerNo">
        <span id="calculatedDisplay"></span>

        <div id="meterContainer" class="hidden">
            <label>Meter No if consumer no. not availlable <span class="asterisk">*</span></label>
            <input type="text" id="meterNo">
        </div>

        <label>DTR No <span class="asterisk">*</span></label>
        <input type="text" id="dtrNo" required>

        <label>Location <span class="asterisk">*</span></label>
        <div class="gps-box">
            <button type="button" id="gpsBtn">📍 Get Location</button>
            <input type="text" id="locationData" readonly required placeholder="Waiting for GPS...">
        </div>

        <button type="submit" id="submitBtn">Save</button>
    </form>

    <!-- New Counter Box -->
    <div class="stats-box">
        <div>Today's Total Entries: <span id="dailyTotalCount">0</span></div>
        <div style="margin-top: 5px;">Entries for DTR <b id="currentDtrLabel">-</b>: <span id="dtrTotalCount">0</span></div>
    </div>
</div>

<script>
    // --- 1. PASTE YOUR GOOGLE SCRIPT URL HERE ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiONamqby7wZ1q8ooc9wobsVNb9TzWkueRM7lNnHoAowwhssbFusNA6x2O5Eb_UA4lCw/exec';

    // --- 2. DEVICE ID GENERATOR ---
    let deviceId = localStorage.getItem('gesd_device_id');
    if (!deviceId) {
        deviceId = 'id-' + Math.random().toString(36).substr(2, 16);
        localStorage.setItem('gesd_device_id', deviceId);
    }

    // --- 3. COUNTER LOGIC (Resets Daily) ---
    const todayStr = new Date().toLocaleDateString();
    let storedDate = localStorage.getItem('gesd_date');
    
    // If it's a new day, reset the counters to 0
    if (storedDate !== todayStr) {
        localStorage.setItem('gesd_date', todayStr);
        localStorage.setItem('gesd_daily_count', 0);
        localStorage.setItem('gesd_dtr_counts', JSON.stringify({}));
    }

    let dailyCount = parseInt(localStorage.getItem('gesd_daily_count')) || 0;
    let dtrCounts = JSON.parse(localStorage.getItem('gesd_dtr_counts')) || {};

    function updateCounters(dtrValue) {
        document.getElementById('dailyTotalCount').textContent = dailyCount;
        let dtrName = dtrValue ? dtrValue.toUpperCase() : "-";
        document.getElementById('currentDtrLabel').textContent = dtrName;
        document.getElementById('dtrTotalCount').textContent = dtrCounts[dtrName] || 0;
    }

    // --- 4. DTR MEMORY & LIVE COUNTER UPDATE ---
    const dtrInput = document.getElementById('dtrNo');
    const savedDtr = localStorage.getItem('gesd_last_dtr');
    
    if (savedDtr) {
        dtrInput.value = savedDtr;
    }
    
    // Update the counter display whenever they type a new DTR
    updateCounters(dtrInput.value);
    dtrInput.addEventListener('input', function() {
        updateCounters(this.value);
    });

    // --- 5. CONSUMER CALCULATION & METER LOGIC ---
    const enteredInput = document.getElementById('enteredConsumerNo');
    const meterContainer = document.getElementById('meterContainer');
    const meterInput = document.getElementById('meterNo');
    const displaySpan = document.getElementById('calculatedDisplay');
    let finalConsumerNumber = "";

    enteredInput.addEventListener('input', function() {
        let val = this.value;
        if (val.trim() === "") {
            displaySpan.textContent = "";
            finalConsumerNumber = "";
            meterContainer.classList.remove('hidden');
            meterInput.setAttribute('required', 'true');
        } else {
            meterContainer.classList.add('hidden');
            meterInput.removeAttribute('required');
            meterInput.value = ""; 
            
            let last5 = val.slice(-5).padStart(5, '0');
            let firstDigit = parseInt(last5.charAt(0));
            let prefix = firstDigit >= 7 ? "0400100" : "0400000";
            finalConsumerNumber = prefix + last5;
            displaySpan.textContent = "Calculated: " + finalConsumerNumber;
        }
    });
    enteredInput.dispatchEvent(new Event('input'));

    // --- 6. GPS CAPTURE ---
    document.getElementById('gpsBtn').addEventListener('click', function() {
        const locInput = document.getElementById('locationData');
        const btn = document.getElementById('gpsBtn');
        btn.textContent = "Locating...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    locInput.value = position.coords.latitude + ", " + position.coords.longitude;
                    btn.textContent = "✅ Captured";
                    btn.style.backgroundColor = "#28a745";
                },
                function(error) {
                    alert("Please turn ON location/GPS in your phone.");
                    btn.textContent = "📍 Retry GPS";
                    btn.style.backgroundColor = "#17a2b8";
                },
                { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
            );
        }
    });

    // --- 7. SUBMIT & CONFIRMATION ---
    document.getElementById('indexingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (!document.getElementById('locationData').value) {
            alert("Please capture GPS Location.");
            return;
        }

        // --- NEW CONFIRMATION POP-UP ---
        let currentDtr = dtrInput.value.toUpperCase();
        let displayId = finalConsumerNumber ? "Consumer: " + finalConsumerNumber : "Meter: " + meterInput.value;
        
        let isConfirmed = confirm("Are you sure you want to save this data?\n\nDTR: " + currentDtr + "\n" + displayId);
        
        if (!isConfirmed) {
            return; // Stops the submission if they click "Cancel"
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";

        localStorage.setItem('gesd_last_dtr', dtrInput.value);

        const payload = {
            enteredConsumerNo: enteredInput.value,
            calculatedConsumer: finalConsumerNumber,
            meterNo: meterInput.value,
            dtrNo: dtrInput.value,
            location: document.getElementById('locationData').value,
            deviceId: deviceId
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(result => {
            // --- UPDATE COUNTERS AFTER SUCCESSFUL SAVE ---
            dailyCount++;
            dtrCounts[currentDtr] = (dtrCounts[currentDtr] || 0) + 1;
            
            localStorage.setItem('gesd_daily_count', dailyCount);
            localStorage.setItem('gesd_dtr_counts', JSON.stringify(dtrCounts));
            
            updateCounters(currentDtr);

            // Reset fields
            enteredInput.value = "";
            meterInput.value = "";
            document.getElementById('locationData').value = "";
            document.getElementById('gpsBtn').textContent = "📍 Get Location";
            document.getElementById('gpsBtn').style.backgroundColor = "#17a2b8";
            enteredInput.dispatchEvent(new Event('input')); 
            
            submitBtn.disabled = false;
            submitBtn.textContent = "Save";
        })
        .catch(error => {
            alert("Error saving data. Check connection.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Save";
        });
    });
</script>
    <script>
    // Register the Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // Handle the Install Prompt
    let deferredPrompt;
    const installBtn = document.getElementById('installAppBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later
        deferredPrompt = e;
        // Update UI notify the user they can install the PWA
        installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
        // Hide the app provided install promotion
        installBtn.classList.add('hidden');
        // Show the install prompt
        deferredPrompt.prompt();
        // Wait for the user to respond to the prompt
        const { outcome } = await deferredPrompt.userChoice;
        // We no longer need the prompt. Clear it up
        deferredPrompt = null;
    });
</script>

</body>
</html>
